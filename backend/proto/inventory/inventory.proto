syntax = "proto3";

package inventory;

option go_package = "shared/proto/inventory;inventorypb";

service InventoryService {
  rpc ReserveStock(ReserveStockRequest) returns (ReserveStockResponse);
}

message ReserveStockRequest {
  string order_id = 1;
  string item = 2;
  int32 quantity = 3;
}

message ReserveStockResponse {
  bool reserved = 1;
  string message = 2;
}
